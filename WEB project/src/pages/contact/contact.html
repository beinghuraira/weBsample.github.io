<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../script.js"></script>

  <title>Contact Page</title>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Navigation -->
  <nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-grey-600">My Website</h1>
   <div class="space-x-6">
        <a href="../../../index.html" class="text-gray-700 hover:text-blue-600">Home</a>
        <a href="../about/about.html" class="text-gray-700 hover:text-blue-600">About</a>
        <a href="../contact/contact.html" class="text-gray-700 hover:text-blue-600">Contact</a>
        <a href="../sign in/signin.html" class="text-gray-700 hover:text-blue-600">Sign In</a>
        <a href="../sign up/signup.html" class="text-gray-700 hover:text-blue-600">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="text-center py-16 bg-gradient-to-r from-green-500 to-indigo-600 text-white">
    <h2 class="text-4xl font-bold mb-4 text-grey">Welcome to Our Contact page</h2>
    <p class="max-w-2xl mx-auto text-lg">
     
    </p>
    <a href="./src/pages/about/about.html" class="mt-6 inline-block bg-grey text-grey-1000 px-6 py-2 rounded-lg shadow hover:bg-green-500">
      Learn More
    </a>
  </section>



  <!-- Contact Form -->
  <section class="bg-gray-200 py-12">
    <div class="max-w-4xl mx-auto px-6">
      <h3 class="text-2xl font-semibold mb-6 text-center">Get in Touch</h3>
      <form class="bg-white p-8 rounded-lg shadow space-y-4">
        <input type="text" name="name" placeholder="Enter your name" class="w-full border rounded px-4 py-2"/>
        <input type="email" name="email" placeholder="Enter your Email" class="w-full border rounded px-4 py-2"/>
        <input type="password" name="password" placeholder="Enter your Password" class="w-full border rounded px-4 py-2"/>
        <input type="number" name="age" max="100" min="1" placeholder="Enter your age" class="w-full border rounded px-4 py-2"/>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Send</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-white shadow-inner py-6 text-center text-gray-600">
    © 2026 My Website. All rights reserved.
  </footer>

</body>
</html>
