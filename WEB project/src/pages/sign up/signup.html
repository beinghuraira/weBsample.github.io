<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Sign Up</title>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white shadow-md">
<div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">

<h1 class="text-xl font-bold text-gray-600">My Website</h1>

<div class="space-x-6">
<a href="index.html" class="text-gray-700 hover:text-green-600">Home</a>
<a href="/src/pages/contact/contact.html" class="text-gray-700 hover:text-green-600">Contact</a>
<a href="/src/pages/about/about.html" class="text-gray-700 hover:text-green-600">About</a>
<a href="signin.html" class="text-gray-700 hover:text-green-600">Sign In</a>
</div>

</div>
</nav>

<!-- Signup Form -->
<div class="flex justify-center items-center h-screen">

<form class="bg-white p-8 rounded-lg shadow w-96 space-y-4">

<h2 class="text-2xl font-bold text-center">Create Account</h2>

<input type="text" placeholder="Full Name"
class="w-full border rounded px-4 py-2">

<input type="email" placeholder="Email"
class="w-full border rounded px-4 py-2">

<input type="password" placeholder="Password"
class="w-full border rounded px-4 py-2">

<button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
Sign Up
</button>

<p class="text-center text-sm">
Already have an account?
<a href="signin.html" class="text-green-600 hover:text-green-800 hover:underline transition duration-200">
  Sign In
</a>
</p>

</form>

</div>

</body>
</html>
